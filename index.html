<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRM · Crespo Real State</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  :root{
    --azul-oscuro:#1F3864; --azul-medio:#2E5496; --azul-claro:#8EAADB; --azul-muyclaro:#D9E1F2; --azul-acero:#0F6FC6;
    --bg:#f4f6fb; --surface:#ffffff; --surface-2:#eef2f9; --hover:#D9E1F2;
    --border:#e3e9f4; --border-soft:#e8edf6; --input-border:#c9d4e8;
    --text:#1a2230; --text-muted:#5b6472; --muted:#7a8494;
    --h1:#1F3864; --h2:#2E5496; --link:#0F6FC6;
    --header-bg:#1F3864; --nav-inactive:#cdd8ef; --nav-active-text:#1F3864;
    --tinta:#1a2230; --chart-bg:#ffffff; color-scheme:light;
  }
  :root[data-theme="dark"]{
    --bg:#0e1520; --surface:#161f2e; --surface-2:#1e2a3d; --hover:#26344b;
    --border:#2a3852; --border-soft:#243147; --input-border:#3a4a6a;
    --text:#dbe4f1; --text-muted:#9aa7ba; --muted:#8593a6;
    --h1:#9cb8e6; --h2:#b3c7ea; --link:#5aa6ef;
    --header-bg:#0c1526; --nav-inactive:#9fb0cf; --nav-active-text:#cfe0ff;
    --tinta:#dbe4f1; --chart-bg:#f2f6fc; color-scheme:dark;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:"Segoe UI",Arial,sans-serif; color:var(--text); background:var(--bg); font-size:13.5px; }
  header{ background:var(--header-bg); color:#fff; padding:10px 18px; display:flex; align-items:center; gap:18px; position:sticky; top:0; z-index:500; }
  header .brand{ font-weight:800; letter-spacing:2px; text-transform:uppercase; font-size:15px; }
  header .brand small{ display:block; font-size:9px; letter-spacing:1px; color:var(--azul-claro); font-weight:400; }
  nav{ display:flex; gap:4px; margin-left:10px; flex-wrap:wrap; }
  nav button{ background:transparent; color:var(--nav-inactive); border:0; padding:8px 13px; border-radius:6px 6px 0 0; cursor:pointer; font-size:13px; font-weight:600; }
  nav button.active{ background:var(--bg); color:var(--nav-active-text); }
  main{ padding:18px; max-width:1200px; margin:0 auto; }
  .view{ display:none; } .view.active{ display:block; }
  h2{ color:var(--h1); font-size:18px; margin:4px 0 12px; }
  h3{ color:var(--h2); font-size:14px; margin:16px 0 6px; }
  .cards{ display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  .card{ background:var(--surface); border:1px solid var(--border); border-left:4px solid var(--azul-acero); border-radius:8px; padding:12px 16px; flex:1 1 150px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .card .v{ font-size:26px; font-weight:800; color:var(--h1); } .card .l{ font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.4px; }
  .panel{ background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  table{ border-collapse:collapse; width:100%; font-size:12px; }
  th,td{ border-bottom:1px solid var(--border-soft); padding:7px 8px; text-align:left; vertical-align:middle; }
  th{ background:var(--azul-oscuro); color:#fff; font-weight:600; cursor:pointer; }
  tbody tr:hover{ background:var(--hover); }
  td.num,th.num{ text-align:right; white-space:nowrap; }
  a{ color:var(--link); text-decoration:none; } a:hover{ text-decoration:underline; }
  button.act{ background:var(--azul-acero); color:#fff; border:0; padding:8px 14px; border-radius:6px; cursor:pointer; font-weight:600; font-size:12.5px; }
  button.ghost{ background:var(--surface); color:var(--h1); border:1px solid var(--azul-claro); }
  button.mini{ padding:3px 8px; font-size:11px; }
  input,select,textarea{ font-family:inherit; font-size:12.5px; padding:6px 8px; border:1px solid var(--input-border); border-radius:5px; width:100%; background:var(--surface); color:var(--text); }
  label{ font-size:11px; color:var(--text-muted); font-weight:600; display:block; margin:6px 0 2px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
  .toolbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
  .pill{ display:inline-block; padding:2px 9px; border-radius:11px; font-size:11px; font-weight:700; color:#fff; }
  .iv-bar{ height:10px; border-radius:5px; background:var(--surface-2); overflow:hidden; }
  .iv-bar > span{ display:block; height:100%; }
  #map{ height:480px; border-radius:8px; }
  dialog{ border:0; border-radius:10px; padding:0; box-shadow:0 8px 40px rgba(0,0,0,.5); width:min(560px,94vw); background:var(--surface); color:var(--text); }
  dialog .dlg-h{ background:var(--azul-oscuro); color:#fff; padding:12px 16px; font-weight:700; border-radius:10px 10px 0 0; }
  dialog .dlg-b{ padding:16px; } dialog .dlg-f{ padding:12px 16px; display:flex; gap:8px; justify-content:flex-end; border-top:1px solid var(--border-soft); }
  #ficha{ width:min(640px,96vw); }
  dialog h4{ color:var(--h1); margin:14px 0 5px; font-size:13px; border-bottom:1px solid var(--border-soft); padding-bottom:3px; }
  dialog h4:first-child{ margin-top:0; }
  .muted{ color:var(--muted); } .small{ font-size:11px; }
  .factor-row{ display:grid; grid-template-columns:1fr 46px 92px 60px; gap:8px; align-items:center; padding:5px 0; border-bottom:1px solid var(--border-soft); }
  .factor-row input[type=range]{ padding:0; }
  /* multiselect (checkboxes) */
  .ms{ position:relative; display:inline-block; }
  .ms-btn{ background:var(--surface); border:1px solid var(--input-border); border-radius:5px; padding:6px 26px 6px 8px; font-size:12.5px; font-family:inherit; color:var(--text); cursor:pointer; width:100%; text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ms-btn:after{ content:"▾"; position:absolute; right:8px; top:6px; color:var(--h2); }
  .ms-btn.on{ border-color:var(--azul-acero); color:var(--h1); font-weight:700; }
  .ms-menu{ position:absolute; z-index:600; top:calc(100% + 3px); left:0; min-width:100%; max-width:320px; max-height:260px; overflow:auto; background:var(--surface); border:1px solid var(--input-border); border-radius:6px; box-shadow:0 6px 20px rgba(0,0,0,.28); padding:4px; }
  .ms-menu label{ display:flex; align-items:center; gap:7px; margin:0; padding:5px 7px; border-radius:4px; font-size:12px; color:var(--text); font-weight:500; cursor:pointer; white-space:nowrap; }
  .ms-menu label:hover{ background:var(--hover); }
  .ms-menu label.all{ font-weight:700; color:var(--h1); border-bottom:1px solid var(--border-soft); border-radius:4px 4px 0 0; }
  .ms-menu input[type=checkbox]{ width:auto; padding:0; margin:0; accent-color:var(--azul-acero); }
  code{ background:var(--surface-2); color:var(--text); padding:1px 5px; border-radius:4px; font-size:11px; }
  pre{ background:#0f1b30; color:#cfe0ff; padding:12px; border-radius:8px; overflow:auto; font-size:11px; line-height:1.5; }
  .theme-btn{ margin-left:auto; background:transparent; border:1px solid rgba(255,255,255,.35); color:#fff; border-radius:6px; padding:5px 9px; cursor:pointer; font-size:14px; line-height:1; }
</style>
</head>
<body>
<header>
  <div class="brand">Crespo Real State<small>CRM · Estudio del Mercado</small></div>
  <nav id="nav"></nav>
  <button id="themeToggle" class="theme-btn" onclick="toggleTheme()" title="Modo claro / oscuro">🌙</button>
  <div id="whoami"></div>
</header>
<main>
  <section class="view" id="v-dashboard"></section>
  <section class="view" id="v-zonas"></section>
  <section class="view" id="v-propiedades"></section>
  <section class="view" id="v-tareas"></section>
  <section class="view" id="v-historico"></section>
  <section class="view" id="v-valorizacion"></section>
  <section class="view" id="v-mapa"><h2>Mapa de propiedades</h2><div class="panel"><div id="mapControls"></div><div id="map"></div><p class="small muted" style="margin-top:8px">Cada punto es una propiedad de la base, coloreada por tipología. Clic para ver su ficha resumida. Los puntos aproximados se ubican alrededor del centro de su zona.</p></div></section>
  <section class="view" id="v-base"></section>
</main>

<dialog id="dlg"><form method="dialog"><div class="dlg-h" id="dlg-h">Editar</div><div class="dlg-b" id="dlg-b"></div><div class="dlg-f"><button class="act ghost" value="cancel">Cancelar</button><button class="act" id="dlg-ok" value="ok">Guardar</button></div></form></dialog>
<dialog id="ficha"><div class="dlg-h" id="ficha-h">Ficha</div><div class="dlg-b" id="ficha-b"></div><div class="dlg-f"><button class="act ghost" onclick="closeFicha(false)">Cerrar</button><button class="act" onclick="closeFicha(true)">Guardar y cerrar</button></div></dialog>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================================
   MODELO DE DATOS — listo para migrar a Supabase (PostgreSQL)
   Esquema SQL equivalente (ver pestaña "Base" para el DDL completo):
     zonas(id, nombre, departamento, localidad, tipologia, usd_m2_ref, lat, lon, perfil, notas)
     propiedades(id, zona, tipologia, direccion, m2, precio_pub, descuento, precio_real, usd_m2, fecha_aviso, estado, portal, url)
     valorizacion(zona, factor -> score)   // 10 factores 0-5
     historico(zona, tipologia, anio, usd_m2, fuente)
   Persistencia local: localStorage (clave 'crespo_crm_db'). Backup/portátil: export/import JSON.
   ============================================================================ */
const FACTORES = [
  {k:'obra',     n:'Obra nueva en curso',        w:15},
  {k:'dens',     n:'Densificación normativa (LVP)', w:12},
  {k:'transp',   n:'Transporte y conectividad',  w:12},
  {k:'comercio', n:'Comercio y servicios',       w:10},
  {k:'educ',     n:'Educación (univ./colegios)', w:10},
  {k:'infra',    n:'Infraestructura pública',    w:10},
  {k:'salud',    n:'Salud',                      w:8},
  {k:'natural',  n:'Amenidad natural (costa/verde)', w:8},
  {k:'seg',      n:'Seguridad y consolidación',  w:8},
  {k:'demanda',  n:'Demanda y absorción',        w:7},
];
function calcIV(sc){ if(!sc) return 0; let iv=0; FACTORES.forEach(f=> iv += f.w*((sc[f.k]||0)/5)); return Math.round(iv); }
function ivColor(iv){ return iv>=75?'#1F3864': iv>=60?'#0F6FC6': iv>=40?'#2E5496':'#8EAADB'; }
function ivLabel(iv){ return iv>=75?'muy fuerte': iv>=60?'fuerte': iv>=40?'moderado':'débil'; }

/* -------------------- DATOS SEMILLA (base histórica inicial) -------------------- */
function seed(){ return { zonas:[], valorizacion:{}, historico:[], propiedades:[] };}
/* Version publicada: base semilla vacia. Los datos se traen de Supabase (login -> Base de datos). */

/* -------------------- PERSISTENCIA -------------------- */
const KEY='crespo_crm_db';
let DB = load();
function load(){ try{ const r=localStorage.getItem(KEY); return r? JSON.parse(r): seed(); }catch(e){ return seed(); } }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(e){ alert('No se pudo guardar en el navegador: '+e.message); } }
function zoneName(id){ const z=DB.zonas.find(z=>z.id===id); return z? z.nombre : id; }

/* -------------------- GESTIÓN (pipeline CRM) + migración de campos -------------------- */
const GESTION=[
  {v:'Sin clasificar', c:'#8892a0'},
  {v:'Prospecto', c:'#8EAADB'},
  {v:'Tomar acción', c:'#0F6FC6'},
  {v:'En seguimiento', c:'#2E5496'},
  {v:'Descartada', c:'#b0b8c4'},
  {v:'Cerrada / Comprada', c:'#1F3864'},
];
function gColor(v){ const g=GESTION.find(g=>g.v===v); return g? g.c : '#8892a0'; }

/* -------------------- TEMA (claro / oscuro) -------------------- */
function applyTheme(t){ t = t==='dark'?'dark':'light'; document.documentElement.setAttribute('data-theme', t); localStorage.setItem('crespo_theme', t); const b=document.getElementById('themeToggle'); if(b) b.textContent = t==='dark'?'☀️':'🌙'; if(mapObj) setTimeout(function(){ mapObj.invalidateSize(); },50); }
function toggleTheme(){ applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); }

/* -------------------- ANALISTAS / SESIÓN (Supabase Auth) -------------------- */
const ANALISTAS=['Mario','Martín','Santiago'];
let sbUser=null;
function analystName(u){ if(!u) return ''; const m=u.user_metadata||{}; return m.name||m.display_name||(u.email? u.email.split('@')[0].replace(/^./,function(c){return c.toUpperCase();}) : 'Analista'); }
function currentAnalyst(){ if(sbUser) return analystName(sbUser); return localStorage.getItem('crespo_analista')||''; }
function setAnalyst(v){ if(v) localStorage.setItem('crespo_analista',v); else localStorage.removeItem('crespo_analista'); renderWhoami(); if(fichaId&&document.getElementById('ficha').open) renderFicha(); }
function renderWhoami(){ const box=document.getElementById('whoami'); if(!box) return;
  const cfg=sbCfg(), configured=!!(cfg.url&&cfg.key);
  if(sbUser){ box.innerHTML=`<span class="small">👤 <b style="color:#fff">${esc(analystName(sbUser))}</b></span> <button class="act ghost mini" onclick="changePassword()" title="Definir o cambiar contraseña / nombre">🔑 Clave</button> <button class="act ghost mini" onclick="logout()">Salir</button>`; return; }
  if(configured){ box.innerHTML=`<span class="small" style="color:#ffd0d0">sin sesión</span> <button class="act mini" onclick="loginDialog()">Ingresar</button>`; return; }
  const cur=localStorage.getItem('crespo_analista')||'';
  box.innerHTML=`<span class="small" style="color:#cdd8ef">Analista:</span>
    <select onchange="setAnalyst(this.value)" style="width:auto;display:inline-block;background:${cur?'#fff':'#ffe9e9'};font-weight:700;padding:4px 8px">
      <option value="" ${cur?'':'selected'}>— elegí quién sos —</option>
      ${ANALISTAS.map(a=>`<option ${cur===a?'selected':''}>${a}</option>`).join('')}
    </select>`;
}
function loginDialog(){ if(!sbClient()){ alert('Primero configurá la conexión en "Base de datos" (Project URL + publishable key).'); show('base'); return; }
  openDlg('Ingresar al CRM', `<div class="grid">
    <div style="grid-column:1/-1"><label>Email</label><input id="lg_mail" type="email" autocomplete="username" placeholder="tuusuario@crespo.uy"></div>
    <div style="grid-column:1/-1"><label>Contraseña</label><input id="lg_pass" type="password" autocomplete="current-password"></div>
  </div><p class="small muted">Usuario de analista creado en Supabase (Mario / Martín / Santiago).</p>`, doLogin); }
async function doLogin(){ const c=sbClient(); const email=(val('lg_mail')||'').trim(), pass=val('lg_pass');
  if(!email||!pass){ alert('Completá email y contraseña.'); return; }
  try{ const r=await c.auth.signInWithPassword({email:email,password:pass}); if(r.error) throw r.error;
    sbUser=r.data.user; renderWhoami(); alert('Sesión iniciada como '+analystName(sbUser)+'.'); if(fichaId&&document.getElementById('ficha').open){ loadNotas(fichaId); }
  }catch(e){ alert('No se pudo ingresar: '+(e.message||e)); } }
async function logout(){ const c=sbClient(); if(c){ try{ await c.auth.signOut(); }catch(e){} } sbUser=null; renderWhoami(); }
function changePassword(){ if(!sbUser){ alert('Ingresá primero.'); return; }
  openDlg('Definir / cambiar contraseña', `<div class="grid">
    <div style="grid-column:1/-1"><label>Nueva contraseña</label><input id="pw1" type="password" autocomplete="new-password"></div>
    <div style="grid-column:1/-1"><label>Repetir contraseña</label><input id="pw2" type="password" autocomplete="new-password"></div>
  </div><p class="small muted">Mínimo 6 caracteres. Con esto entrás con tu email + contraseña, sin depender del magic link. También podés ponerle un nombre visible abajo.</p>
  <div class="grid"><div style="grid-column:1/-1"><label>Nombre visible (opcional, ej: Santiago)</label><input id="pw_name" value="${esc(analystName(sbUser))}"></div></div>`, doChangePassword); }
async function doChangePassword(){ const a=val('pw1'), b=val('pw2'), nombre=(val('pw_name')||'').trim();
  if(a && a.length<6){ alert('La contraseña debe tener al menos 6 caracteres.'); return; }
  if(a!==b){ alert('Las dos contraseñas no coinciden.'); return; }
  const c=sbClient(); const payload={}; if(a) payload.password=a; if(nombre) payload.data={name:nombre};
  if(!payload.password && !payload.data){ return; }
  try{ const r=await c.auth.updateUser(payload); if(r.error) throw r.error; if(r.data&&r.data.user) sbUser=r.data.user; renderWhoami();
    alert((payload.password?'Contraseña definida. ':'')+ (payload.data?'Nombre actualizado. ':'') + (payload.password?'La próxima vez entrás con tu email y esta contraseña.':'')); }
  catch(e){ alert('No se pudo actualizar: '+(e.message||e)); } }
async function logAccion(p,texto){ if(sbUser){ const c=sbClient(); try{ const r=await c.from('notas').insert({propiedad_id:p.id,autor:currentAnalyst(),texto:texto}); if(r.error) throw r.error; await loadNotas(p.id); }catch(e){ alert('No se pudo registrar la nota: '+(e.message||e)); } }
  else { p.acciones.push({fecha:hoyStr(),texto:texto,autor:currentAnalyst()}); save(); if(fichaId===p.id&&document.getElementById('ficha').open) renderFicha(); } }
async function loadNotas(id){ const c=sbClient(); if(!c||!sbUser) return; try{ const r=await c.from('notas').select('*').eq('propiedad_id',id).order('created_at',{ascending:false}); if(r.error) throw r.error;
    const p=DB.propiedades.find(x=>x.id===id); if(!p) return; p._notas=r.data||[]; p._notasLoaded=true; if(fichaId===id&&document.getElementById('ficha').open) renderFicha();
  }catch(e){ console.warn('loadNotas',e); } }
async function delNota(id){ if(!confirm('¿Borrar esta nota?')) return; const c=sbClient(); try{ const r=await c.from('notas').delete().eq('id',id); if(r.error) throw r.error; await loadNotas(fichaId); }catch(e){ alert('No se pudo borrar: '+(e.message||e)); } }
async function liveUpsert(p){ if(!sbUser) return; const c=sbClient(); if(!c) return; const row=toRow(p);
  try{ let r=await c.from('propiedades').upsert(row,{onConflict:'id'});
    if(r.error){ const m=(r.error.message||''); const miss=['responsable','estado_tarea','fecha_alta','lat','lon'].filter(f=>m.indexOf(f)>=0);
      if(miss.length){ const o=Object.assign({},row); miss.forEach(f=>delete o[f]); r=await c.from('propiedades').upsert(o,{onConflict:'id'}); } }
    if(r.error) throw r.error;
  }catch(e){ console.warn('liveUpsert',e); } }
async function liveUpsertZona(z){ if(!sbUser) return; const c=sbClient(); try{ const r=await c.from('zonas').upsert(Object.assign({},z,{valorizacion:DB.valorizacion[z.id]||{}}),{onConflict:'id'}); if(r.error) throw r.error; }catch(e){ console.warn('liveUpsertZona',e); } }

/* -------------------- PLANTILLAS DE MENSAJES (WhatsApp / Mail) -------------------- */
const MSG_DEFAULT=[
  {nombre:'Consulta inicial', texto:'Hola, te consulto por la propiedad de {dir} ({zona}). ¿Sigue disponible? Gracias. — {analista}, Crespo Real State'},
  {nombre:'Pedir datos', texto:'Hola, estoy interesado en {dir} ({tipologia}, {zona}). ¿Me pasás metraje, gastos comunes y si acepta oferta? Gracias. — {analista}'},
  {nombre:'Coordinar visita', texto:'Hola, quería coordinar una visita a {dir} ({zona}). ¿Qué disponibilidad tenés esta semana? — {analista}, Crespo Real State'},
];
function msgTemplates(){ try{ const r=localStorage.getItem('crespo_msg_tpl'); return r?JSON.parse(r):MSG_DEFAULT.slice(); }catch(e){ return MSG_DEFAULT.slice(); } }
function saveTemplates(arr){ localStorage.setItem('crespo_msg_tpl', JSON.stringify(arr)); }
function fillTpl(txt,p){ const z=DB.zonas.find(z=>z.id===p.zona)||{}; const precio=p.precio_real||p.precio_pub;
  return (txt||'').replace(/{dir}/g,p.direccion||'').replace(/{zona}/g,z.nombre||'').replace(/{tipologia}/g,p.tipologia||'')
    .replace(/{precio}/g,precio?('US$ '+(+precio).toLocaleString('es-UY')):'a confirmar').replace(/{m2}/g,p.m2||'').replace(/{usdm2}/g,p.usd_m2||'')
    .replace(/{analista}/g,currentAnalyst()||'Crespo Real State'); }
function waLink(tel,msg){ const num=(''+(tel||'')).replace(/[^\d]/g,''); return 'https://wa.me/'+num+'?text='+encodeURIComponent(msg); }
function mailLink(mail,p,msg){ return 'mailto:'+encodeURIComponent(mail||'')+'?subject='+encodeURIComponent('Consulta — '+(p.direccion||'propiedad')+' ('+(DB.zonas.find(z=>z.id===p.zona)||{}).nombre+')')+'&body='+encodeURIComponent(msg); }
function sendWhatsApp(){ const p=DB.propiedades.find(x=>x.id===fichaId); if(!p) return; const c=p.contacto||{};
  const tel=val('c_tel')||c.telefono; if(!tel){ alert('Cargá primero el teléfono del contacto.'); return; }
  const t=msgTemplates()[+val('msg_tpl')||0]; const msg=fillTpl(t.texto,p); syncFichaInputs();
  window.open(waLink(tel,msg),'_blank');
  logAccion(p,'WhatsApp enviado ('+t.nombre+')'); }
function sendMail(){ const p=DB.propiedades.find(x=>x.id===fichaId); if(!p) return; const c=p.contacto||{};
  const mail=val('c_mail')||c.email; if(!mail){ alert('Cargá primero el email del contacto.'); return; }
  const t=msgTemplates()[+val('msg_tpl')||0]; const msg=fillTpl(t.texto,p); syncFichaInputs();
  window.open(mailLink(mail,p,msg),'_blank');
  logAccion(p,'Mail enviado ('+t.nombre+')'); }
function editTemplates(){ const tpl=msgTemplates();

const SEED_COMMENTS={};
const SEED_CONTACTS={};
function migrate(){ DB.propiedades.forEach(p=>{ if(p.comentarios===undefined) p.comentarios = SEED_COMMENTS[p.id]||''; if(p.gestion===undefined) p.gestion='Sin clasificar'; if(p.proxima_accion===undefined) p.proxima_accion=''; if(p.fecha_seguimiento===undefined) p.fecha_seguimiento=''; if(p.responsable===undefined) p.responsable=''; if(p.estado_tarea===undefined) p.estado_tarea = (p.proxima_accion||'').trim()?'Pendiente':''; if(p.contacto===undefined) p.contacto = SEED_CONTACTS[p.id] || {nombre:'',telefono:'',email:'',inmobiliaria:''}; if(!Array.isArray(p.acciones)) p.acciones=[];
  /* alta en CRM = cuándo entró a ESTA base. NO se estima con fecha_aviso (esa es la antigüedad del aviso en el portal).
     Las propiedades viejas quedan s/d hasta traer created_at de Supabase (botón en Base de datos). */
  if(p.fecha_alta===undefined) p.fecha_alta='';

}); }

/* -------------------- ANTIGÜEDAD EN EL CRM -------------------- */
const ANTIG=[{v:'nuevas',l:'Nuevas (≤7 días)',c:'#0F6FC6'},{v:'30',l:'8 – 30 días',c:'#2E5496'},{v:'90',l:'31 – 90 días',c:'#8EAADB'},{v:'viejas',l:'Más de 90 días',c:'#1F3864'},{v:'sd',l:'Sin fecha de alta',c:'#7a8494'}];
function diasCRM(p){ if(!p.fecha_alta) return null; const d=Math.floor((Date.now()-new Date(p.fecha_alta+'T00:00:00').getTime())/86400000); return d<0?0:d; }
function antigBucket(p){ const d=diasCRM(p); if(d===null) return 'sd'; return d<=7?'nuevas' : d<=30?'30' : d<=90?'90' : 'viejas'; }
function antigColor(p){ const b=antigBucket(p), a=ANTIG.find(x=>x.v===b); return a?a.c:'#7a8494'; }
function diasTxt(p){ const d=diasCRM(p); if(d===null) return 's/d'; return d===0?'hoy' : d===1?'1 día' : d+' días'; }
/* -------------------- TAREAS (responsable + estado) -------------------- */
const RESPONSABLES=['Mario','Martín','Santiago'];
const ESTADOS_TAREA=[{v:'Pendiente',c:'#8EAADB'},{v:'Activa',c:'#0F6FC6'},{v:'Cerrada',c:'#1F3864'}];
function estadoTareaColor(v){ const e=ESTADOS_TAREA.find(x=>x.v===v); return e?e.c:'#8892a0'; }
function respOpts(sel){ return '<option value="">— sin asignar —</option>'+RESPONSABLES.map(r=>`<option ${sel===r?'selected':''}>${r}</option>`).join(''); }
function estadoTareaOpts(sel){ return '<option value="">—</option>'+ESTADOS_TAREA.map(e=>`<option ${sel===e.v?'selected':''}>${e.v}</option>`).join(''); }
/* estado mostrado: si hay acción a tomar y no se fijó estado, se asume Pendiente */
function tareaEstado(p){ return p.estado_tarea || ((p.proxima_accion||'').trim()?'Pendiente':''); }
function setTarea(id,campo,valor){ const p=DB.propiedades.find(x=>x.id===id); if(!p)return; p[campo]=valor; if(campo==='estado_tarea'&&!valor&&(p.proxima_accion||'').trim()) p.estado_tarea='Pendiente'; save(); liveUpsert(p); renderTareas(); }
function setCampo(id,campo,valor){ const p=DB.propiedades.find(p=>p.id===id); if(!p)return; p[campo]=valor; save(); liveUpsert(p); if(campo==='gestion') renderProps(); }
function gotoGestion(v){ propFilter.gestion=[v]; propFilter.zonas=[...dashFilter.zonas]; propFilter.tips=[...dashFilter.tips]; propFilter.antig=[]; propFilter.q=''; show('propiedades'); }

/* -------------------- MULTISELECT (desplegable con checkboxes) -------------------- */
const MSOPEN={};
function msOpen(id,rerender){ const was=MSOPEN[id]; Object.keys(MSOPEN).forEach(k=>MSOPEN[k]=false); MSOPEN[id]=!was; window[rerender](); }
function msPick(arr,v){ if(!v) return []; const i=arr.indexOf(v); if(i<0) arr.push(v); else arr.splice(i,1); return arr; }
function msLabel(ph,opts,sel){ if(!sel.length) return ph; if(sel.length===1){ const o=opts.find(o=>o.v===sel[0]); return o?o.l:sel[0]; } return sel.length+' seleccionados'; }
/* id: clave única · ph: texto "todas…" · opts:[{v,l}] · sel: array de valores · pick: nombre de función global que recibe (valor) · rerender: nombre de la función que repinta la vista */
function msBox(id,ph,opts,sel,pick,rerender,width){
  const open=!!MSOPEN[id];
  return `<div class="ms" style="width:${width||210}px">
    <button class="ms-btn ${sel.length?'on':''}" title="${esc(sel.length?msLabel(ph,opts,sel):ph)}" onclick="msOpen('${id}','${rerender}')">${esc(msLabel(ph,opts,sel))}</button>
    ${open? `<div class="ms-menu">
      <label class="all"><input type="checkbox" ${sel.length?'':'checked'} onchange="${pick}('')"> ${esc(ph)}</label>
      ${opts.map(o=>`<label><input type="checkbox" ${sel.includes(o.v)?'checked':''} onchange="${pick}('${esc(o.v).replace(/'/g,"\\'")}')"> ${esc(o.l)}</label>`).join('')}
    </div>` : ''}
  </div>`;
}

function syncFichaInputs(){ const p=DB.propiedades.find(x=>x.id===fichaId); if(!p)return; p.contacto={nombre:val('c_nombre'),inmobiliaria:val('c_inmo'),telefono:val('c_tel'),email:val('c_mail')}; p.proxima_accion=val('c_pacc'); p.fecha_seguimiento=val('c_fseg'); p.responsable=val('c_resp'); p.estado_tarea=val('c_estado')||((p.proxima_accion||'').trim()?'Pendiente':''); save(); liveUpsert(p); }

/* -------------------- TAREAS (pestaña) -------------------- */
let tareaFilter={estado:[],resp:[]};
function tareaPickEstado(v){ tareaFilter.estado=msPick(tareaFilter.estado,v); renderTareas(); }
function tareaPickResp(v){ tareaFilter.resp=msPick(tareaFilter.resp,v); renderTareas(); }
function tareaClear(){ tareaFilter={estado:[],resp:[]}; renderTareas(); }
function renderTareas(){
  const cont=document.getElementById('v-tareas');
  const all=DB.propiedades.filter(p=>(p.proxima_accion||'').trim());
  const hoy=hoyStr();
  const cnt={Pendiente:0,Activa:0,Cerrada:0};
  all.forEach(p=>{ const s=tareaEstado(p); if(cnt[s]!==undefined) cnt[s]++; });
  const abiertas=cnt.Pendiente+cnt.Activa;
  const vencidas=all.filter(p=>p.fecha_seguimiento&&p.fecha_seguimiento<hoy&&tareaEstado(p)!=='Cerrada').length;
  const cntR={}; RESPONSABLES.forEach(r=>cntR[r]=0); let sinAsig=0;
  all.forEach(p=>{ if(p.responsable&&cntR[p.responsable]!==undefined) cntR[p.responsable]++; else if(!p.responsable) sinAsig++; });
  const fe=tareaFilter.estado, fr=tareaFilter.resp;
  let list=all.filter(p=>{ const s=tareaEstado(p), r=p.responsable||'—'; return (!fe.length||fe.includes(s))&&(!fr.length||fr.includes(r)); });
  const order={Activa:0,Pendiente:1,Cerrada:2};
  list.sort((a,b)=>{ const oa=order[tareaEstado(a)]!==undefined?order[tareaEstado(a)]:1, ob=order[tareaEstado(b)]!==undefined?order[tareaEstado(b)]:1; if(oa!==ob) return oa-ob; return (''+(a.fecha_seguimiento||'9999-99-99')).localeCompare(''+(b.fecha_seguimiento||'9999-99-99')); });
  const chip=(label,count,active,onclick,color)=>`<button class="act ghost mini" onclick="${onclick}" style="border-color:${color};${active?`background:${color};color:#fff`:`color:${color}`}">${esc(label)} <b>${count}</b></button>`;
  const estadoChips=ESTADOS_TAREA.map(e=>chip(e.v,cnt[e.v]||0,fe.includes(e.v),`tareaPickEstado('${e.v}')`,e.c)).join(' ');
  const respChips=RESPONSABLES.map(r=>chip(r,cntR[r]||0,fr.includes(r),`tareaPickResp('${r}')`,'#2E5496')).join(' ')+' '+chip('Sin asignar',sinAsig,fr.includes('—'),`tareaPickResp('—')`,'#8892a0');
  const rows=list.map(p=>{ const s=tareaEstado(p); const vc=p.fecha_seguimiento&&p.fecha_seguimiento<hoy&&s!=='Cerrada';
    return `<tr style="cursor:pointer" onclick="if(!/SELECT|OPTION/.test(event.target.tagName))openFicha('${p.id}')">
      <td><b>${esc(p.direccion||'s/d')}</b><div class="small muted">${esc(zoneName(p.zona))} · ${esc(p.tipologia||'')}</div></td>
      <td>${esc(p.proxima_accion||'')}</td>
      <td><select onchange="setTarea('${p.id}','responsable',this.value)" style="min-width:118px">${respOpts(p.responsable||'')}</select></td>
      <td><select onchange="setTarea('${p.id}','estado_tarea',this.value)" style="min-width:118px;font-weight:700;color:${estadoTareaColor(s)}">${estadoTareaOpts(p.estado_tarea||'')}</select></td>
      <td>${p.fecha_seguimiento?`<span class="pill" style="background:${vc?'#1F3864':'#0F6FC6'}">${p.fecha_seguimiento}${vc?' · vencida':''}</span>`:'<span class="small muted">s/d</span>'}</td>
    </tr>`; }).join('');
  cont.innerHTML=`<h2>Tareas</h2>
    <div class="panel">
      <div class="cards">
        <div class="card"><div class="v">${all.length}</div><div class="l">Tareas totales</div></div>
        <div class="card"><div class="v">${abiertas}</div><div class="l">Abiertas (activas + pendientes)</div></div>
        <div class="card"><div class="v">${cnt.Cerrada}</div><div class="l">Cerradas</div></div>
        <div class="card"><div class="v" style="color:#1F3864">${vencidas}</div><div class="l">Vencidas sin cerrar</div></div>
      </div>
      <div style="margin:12px 0 4px"><span class="small muted">Estado:</span> ${estadoChips} ${(fe.length||fr.length)?`<button class="act ghost mini" onclick="tareaClear()">✕ limpiar filtros</button>`:''}</div>
      <div style="margin:6px 0 12px"><span class="small muted">Responsable:</span> ${respChips}</div>
      ${list.length?`<div style="overflow:auto"><table><thead><tr><th>Propiedad</th><th>Acción a tomar</th><th>Responsable</th><th>Estado</th><th>Seguimiento</th></tr></thead><tbody>${rows}</tbody></table></div>`
        :`<p class="small muted">No hay tareas${(fe.length||fr.length)?' con ese filtro':''}. Las tareas se crean cargando una <b>“próxima acción a tomar”</b> en la ficha de una propiedad (pestaña <b>Propiedades</b> → botón 🗂 → sección “Próxima acción a tomar”).</p>`}
    </div>`;
}

/* -------------------- ACTUALIZACIÓN DE BASE (merge con dedupe por URL) -------------------- */
/* Nota: un archivo local no puede rastrear portales por CORS. Este lote es data real ya relevada;
   el rastreo automático continuo se hace desde el backend (Supabase + job) tras la migración. */
const NUEVOS_AVISOS=[];
function mergeNuevos(arr){ const urls=new Set(DB.propiedades.map(p=>p.url)); let added=0,dup=0;
  arr.forEach(n=>{ if(n.url&&urls.has(n.url)){ dup++; return; } const p=Object.assign({descuento:'',precio_real:'',fecha_aviso:'',comentarios:'',gestion:'Sin clasificar',proxima_accion:'',fecha_seguimiento:'',portal:'InfoCasas',contacto:{nombre:'',telefono:'',email:'',inmobiliaria:''},acciones:[]},n,{fecha_alta:hoyStr()}); if(!p.id) p.id='P'+Date.now().toString(36)+Math.floor(Math.random()*1e4); DB.propiedades.push(p); if(p.url)urls.add(p.url); added++; });
  if(added) save(); return {added,dup}; }
function refreshBase(){ const r=mergeNuevos(NUEVOS_AVISOS); alert('Actualización de base:\n• '+r.added+' aviso(s) nuevo(s) agregado(s)\n• '+r.dup+' ya estaban en la base (omitidos por duplicado)\n\nExportá el JSON en la pestaña Base para conservar el histórico.'); renderHistorico(); }

/* -------------------- DASHBOARD -------------------- */
function avg(arr){ arr=arr.filter(x=>typeof x==='number'&&!isNaN(x)); return arr.length? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0; }
let dashFilter={zonas:[],tips:[]};
function dashPickZona(v){ dashFilter.zonas=msPick(dashFilter.zonas,v); renderDashboard(); }
function dashPickTip(v){ dashFilter.tips=msPick(dashFilter.tips,v); renderDashboard(); }
function dashSeg(zona,tip){ dashFilter.zonas=zona?[zona]:[]; dashFilter.tips=tip?[tip]:[]; renderDashboard(); }
function dashAddZona(z){ if(!dashFilter.zonas.includes(z)) dashFilter.zonas.push(z); renderDashboard(); }
/* estadísticos USD/m² de una lista de propiedades (la mediana manda) */
function statsUSD(list){
  const v=list.map(p=>+p.usd_m2).filter(x=>x>0&&!isNaN(x));
  return {n:list.length, nv:v.length, med:v.length?Math.round(median(v)):0, avg:avg(v),
          mn:v.length?Math.round(Math.min.apply(null,v)):0, mx:v.length?Math.round(Math.max.apply(null,v)):0};
}

      <div class="cards">

      <td class="num">${(+z.usd_m2_ref).toLocaleString('es-UY')}</td>

}
function editZona(id){
  const z = id? DB.zonas.find(z=>z.id===id) : {id:'z'+Date.now(),nombre:'',departamento:'',localidad:'',tipologia:'',usd_m2_ref:0,lat:-34.9,lon:-55.0,perfil:'',notas:''};
  openDlg(id?'Editar zona':'Nueva zona', `
    <div class="grid">
      <div style="grid-column:1/-1"><label>Nombre</label><input id="f_nombre" value="${z.nombre}"></div>
      <div><label>Departamento</label><input id="f_departamento" value="${z.departamento}"></div>
      <div><label>Localidad</label><input id="f_localidad" value="${z.localidad||''}"></div>
      <div><label>Tipología dominante</label><input id="f_tipologia" value="${z.tipologia}"></div>
      <div><label>USD/m² referencia</label><input id="f_usd" type="number" value="${z.usd_m2_ref}"></div>
      <div><label>Lat</label><input id="f_lat" type="number" step="0.0001" value="${z.lat}"></div>
      <div><label>Lon</label><input id="f_lon" type="number" step="0.0001" value="${z.lon}"></div>
      <div style="grid-column:1/-1"><label>Perfil</label><input id="f_perfil" value="${z.perfil||''}"></div>
      <div style="grid-column:1/-1"><label>Notas</label><textarea id="f_notas" rows="2">${z.notas||''}</textarea></div>
    </div>`, ()=>{
      z.nombre=val('f_nombre'); z.departamento=val('f_departamento'); z.localidad=val('f_localidad');
      z.tipologia=val('f_tipologia'); z.usd_m2_ref=+val('f_usd'); z.lat=+val('f_lat'); z.lon=+val('f_lon');
      z.perfil=val('f_perfil'); z.notas=val('f_notas');
      if(!id){ DB.zonas.push(z); DB.valorizacion[z.id]={obra:0,dens:0,transp:0,comercio:0,educ:0,infra:0,salud:0,natural:0,seg:0,demanda:0}; }
      save(); liveUpsertZona(z); renderZonas();
    });
}

let propFilter={zonas:[],tips:[],q:'',gestion:[],antig:[]}, propSort={k:'usd_m2',dir:1};
function propPickZona(v){ propFilter.zonas=msPick(propFilter.zonas,v); renderProps(); }
function propPickTip(v){ propFilter.tips=msPick(propFilter.tips,v); renderProps(); }
function propPickGest(v){ propFilter.gestion=msPick(propFilter.gestion,v); renderProps(); }
function propPickAntig(v){ propFilter.antig=msPick(propFilter.antig,v); renderProps(); }
function gotoAntig(v){ propFilter={zonas:[...dashFilter.zonas],tips:[...dashFilter.tips],q:'',gestion:[],antig:[v]}; show('propiedades'); }
function renderProps(){
  const tips=[...new Set(DB.propiedades.map(p=>p.tipologia))];
  const fz=propFilter.zonas, ft=propFilter.tips, fg=propFilter.gestion, fa=propFilter.antig;
  let list=DB.propiedades.filter(p=>
    (!fz.length||fz.includes(p.zona))&&(!ft.length||ft.includes(p.tipologia))&&
    (!fg.length||fg.includes(p.gestion))&&(!fa.length||fa.includes(antigBucket(p)))&&
    (!propFilter.q||(p.direccion+' '+p.estado+' '+(p.comentarios||'')).toLowerCase().includes(propFilter.q.toLowerCase())));
  list.sort((a,b)=>{ let x=a[propSort.k],y=b[propSort.k]; if(typeof x==='string')return propSort.dir*(''+x).localeCompare(''+y); return propSort.dir*((+x||0)-(+y||0)); });
  const money=v=>v?('US$ '+(+v).toLocaleString('es-UY')):'s/d';
  const gestOpts=p=>GESTION.map(g=>`<option ${p.gestion===g.v?'selected':''}>${g.v}</option>`).join('');
  document.getElementById('v-propiedades').innerHTML=`
    <h2>Propiedades / comparables <button class="act" style="float:right" onclick="editProp()">+ Nueva propiedad</button></h2>
    <div class="panel">
      <div class="toolbar">
        ${msBox('pz','Todas las zonas',DB.zonas.map(z=>({v:z.id,l:z.nombre})),fz,'propPickZona','renderProps',200)}
        ${msBox('pt','Todas las tipologías',tips.filter(Boolean).map(t=>({v:t,l:t})),ft,'propPickTip','renderProps',195)}
        ${msBox('pg','Toda la gestión',GESTION.map(g=>({v:g.v,l:g.v})),fg,'propPickGest','renderProps',180)}
        ${msBox('pa','Toda la antigüedad',ANTIG.map(a=>({v:a.v,l:a.l})),fa,'propPickAntig','renderProps',185)}
        <input style="max-width:200px;width:200px" placeholder="Buscar ubicación/comentario…" value="${esc(propFilter.q)}" oninput="propFilter.q=this.value;clearTimeout(window._t);window._t=setTimeout(renderProps,250)">
        ${(fz.length||ft.length||fg.length||fa.length||propFilter.q)?`<button class="act ghost mini" onclick="propFilter={zonas:[],tips:[],q:'',gestion:[],antig:[]};renderProps()">✕ Limpiar</button>`:''}
        <span class="small muted">${list.length} resultado(s)${(()=>{const st=statsUSD(list); return st.nv?` · mediana USD/m² <b>${st.med.toLocaleString('es-UY')}</b> (${st.mn.toLocaleString('es-UY')}–${st.mx.toLocaleString('es-UY')})`:'';})()}</span>
      </div>
      <div style="overflow:auto"><table><thead><tr>
        ${[['direccion','Ubicación'],['zona','Zona'],['tipologia','Tipología'],['m2','m²'],['precio_pub','Precio pub.'],['descuento','Desc.'],['precio_real','Precio real'],['usd_m2','USD/m²'],['fecha_aviso','Fecha aviso'],['estado','Estado']].map(([k,l])=>`<th onclick="sortProp('${k}')">${l}</th>`).join('')}<th>Comentarios</th><th>Gestión</th><th>Seguimiento</th><th>Aviso</th><th></th>
      </tr></thead><tbody>
      ${list.map(p=>`<tr>
        <td>${p.direccion}</td><td>${zoneName(p.zona)}</td><td>${p.tipologia}</td>
        <td class="num">${p.m2||'s/d'}</td>
        <td class="num">${money(p.precio_pub)}</td>
        <td class="num">${(p.descuento!==''&&p.descuento!==undefined&&p.descuento!==null)?('−'+p.descuento+'%'):'s/d'}</td>
        <td class="num">${p.precio_real?money(p.precio_real):'s/d'}</td>
        <td class="num"><b>${p.usd_m2||'s/d'}</b></td>
        <td>${p.fecha_aviso||'s/d'}</td>
        <td>${p.estado||''}</td>
        <td><input style="min-width:160px" value="${(p.comentarios||'').replace(/"/g,'&quot;')}" placeholder="ej: con garaje, esquina…" onchange="setCampo('${p.id}','comentarios',this.value)"></td>
        <td><select style="min-width:140px;border-color:${gColor(p.gestion)};color:${gColor(p.gestion)};font-weight:700" onchange="setCampo('${p.id}','gestion',this.value)">${gestOpts(p)}</select></td>
        <td><button class="act ghost mini" style="min-width:150px;max-width:200px;text-align:left;white-space:normal" onclick="openFicha('${p.id}')">🗂 ${p.proxima_accion? esc(p.proxima_accion).slice(0,28) : 'Ficha / acciones'}${(p.acciones&&p.acciones.length)?` · ${p.acciones.length}✓`:''}</button>${p.fecha_seguimiento?`<div class="small muted" style="margin-top:3px">📅 ${p.fecha_seguimiento}</div>`:''}</td>

        <td><button class="act ghost mini" onclick="editProp('${p.id}')">✎</button></td></tr>`).join('')}
      </tbody></table></div>
    </div>`;
}

    const med=Math.round(median(vals)), mn=vals.length?Math.round(Math.min.apply(null,vals)):0, mx=vals.length?Math.round(Math.max.apply(null,vals)):0, avg=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
    const zserie=DB.historico.filter(h=>h.zona===g.zona).sort((a,b)=>a.anio-b.anio);
    const cg=cagr(zserie), estim=zserie.filter(h=>/estim/i.test(h.fuente||'')).length;
    html+=`<div class="panel">
      <h3 style="margin-top:0">${zoneName(g.zona)} · ${g.tipo} <span class="pill" style="background:${n<10?'#8892a0':'#0F6FC6'};margin-left:6px">${n} prospecto${n===1?'':'s'}</span></h3>
      ${n&&n<10?`<div class="box" style="border-left:4px solid var(--azul-acero);background:var(--surface-2);border-radius:0 6px 6px 0;padding:8px 10px;margin:6px 0"><b>⚠ Muestra de ${n} (&lt; 10):</b> la muestra <b>no es del todo representativa</b>; los valores son indicativos y se robustecen al actualizar la base.</div>`:''}
      ${vals.length?`<div class="small muted" style="margin:2px 0 4px">USD/m²: mín <b>${mn}</b> · mediana <b>${med}</b> · promedio <b>${avg}</b> · máx <b>${mx}</b></div>${barChartH(items)}`:''}
      ${zserie.length>1?`
        <h4 style="color:var(--azul-medio);font-size:12px;margin:14px 0 2px;border:0">Serie ${zserie[0].anio}–${zserie[zserie.length-1].anio} y proyección ${zserie[zserie.length-1].anio+1}–${zserie[zserie.length-1].anio+años} (USD/m²)</h4>
        ${lineChartProj(zserie,años)}
        <div class="small muted" style="margin:2px 0 6px">Variación acumulada ${zserie[0].anio}→${zserie[zserie.length-1].anio}: <b>${Math.round((zserie[zserie.length-1].usd_m2/zserie[0].usd_m2-1)*100)}%</b> · CAGR observado: <b>${cg===null?'s/d':cg.toFixed(1)+'%'}</b> anual${cg!==null?` · si se mantuviera el CAGR, ${zserie[zserie.length-1].anio+años} ≈ <b>${Math.round(zserie[zserie.length-1].usd_m2*Math.pow(1+cg/100,años)).toLocaleString('es-UY')}</b> USD/m²`:''}</div>
        ${proyTabla(zserie,años)}
        <h4 style="color:var(--azul-medio);font-size:12px;margin:14px 0 2px;border:0">Puntos de la serie y su fuente <span class="small muted" style="font-weight:400">· editables</span></h4>
        <table><thead><tr><th>Año</th><th class="num">USD/m²</th><th>Fuente</th><th></th></tr></thead><tbody>
        ${zserie.map(h=>{ const i=DB.historico.indexOf(h); return `<tr><td><b>${h.anio}</b></td>
          <td class="num"><input style="width:90px;text-align:right" type="number" step="0.1" value="${h.usd_m2}" onchange="setHist(${i},'usd_m2',this.value)"></td>
          <td><input value="${esc(h.fuente||'')}" onchange="setHist(${i},'fuente',this.value)"></td>
          <td><button class="act ghost mini" onclick="delHist(${i})">✕</button></td></tr>`; }).join('')}
        </tbody></table>
        <div class="toolbar" style="margin:8px 0 0"><button class="act ghost mini" onclick="addHist('${g.zona}','${esc(zserie[0].tipologia||g.tipo)}')">+ Agregar año</button>
        ${estim?`<span class="small muted">⚠ ${estim} de ${zserie.length} puntos son <b>estimación declarada</b> (no dato publicado). Reemplazalos cuando tengas la fuente.</span>`:''}</div>
      ` : `<p class="small muted" style="margin-top:8px">Sin serie histórica cargada para esta zona. ${/Maldonado/.test((DB.zonas.find(z=>z.id===g.zona)||{}).departamento||'')?'Tocá <b>“Cargar serie 5 años de Maldonado”</b> arriba.':'Agregá puntos con el botón de abajo.'} <button class="act ghost mini" onclick="addHist('${g.zona}','${esc(g.tipo)}')">+ Agregar año</button></p>`}
      <p style="margin:10px 0 2px"><b>Qué muestra:</b> ${histNote(g.zona,g.tipo,{mn,med,mx,avg,n})}</p>
      <p style="margin:2px 0"><b>Variables que explican el cambio (top factores de valorización):</b> ${topDrivers(g.zona)||'s/d'}.</p>
    </div>`; });
  document.getElementById('v-historico').innerHTML=html;
}
function setHist(i,campo,valor){ const h=DB.historico[i]; if(!h) return; h[campo]= campo==='usd_m2'? (+valor||0) : valor; save(); if(campo==='usd_m2') renderHistorico(); }
function delHist(i){ if(!confirm('¿Borrar este punto de la serie?')) return; DB.historico.splice(i,1); save(); renderHistorico(); }
function addHist(zona,tipologia){

  openDlg('Agregar punto histórico', `<div class="grid">

  </div>`, ()=>{

/* -------------------- INFORME RÁPIDO (zona/tipología) -------------------- */
function generarInforme(){
  const fz=dashFilter.zonas, ft=dashFilter.tips;
  if(!fz.length && !ft.length){ alert('Elegí al menos una zona o una tipología en el filtro del Panel para acotar el informe.'); return; }
  const sel=DB.propiedades.filter(p=>(!fz.length||fz.includes(p.zona))&&(!ft.length||ft.includes(p.tipologia)));
  if(!sel.length){ alert('No hay propiedades en ese segmento.'); return; }
  const zonasSel = fz.length? fz.slice() : [...new Set(sel.map(p=>p.zona))];
  const s=statsUSD(sel);
  const nomZ = fz.length? fz.map(zoneName).join(' + ') : 'Todas las zonas';
  const nomT = ft.length? ft.join(' + ') : 'Todas las tipologías';
  const hoy=hoyStr();
  const money=v=>v?('US$ '+(+v).toLocaleString('es-UY')):'s/d';
  const años=proyCfg.años;
  const pivot=s.med; // la mediana manda: pivote de selección y de salida
  /* comparables ordenados por USD/m² (asc) */
  const comps=[...sel].filter(p=>+p.usd_m2>0).sort((a,b)=>(+a.usd_m2)-(+b.usd_m2));
  /* selección curada: 5 principales sobre la mediana + piso (mín.) + techo (máx.) */
  let compSel;
  if(comps.length<=7){ compSel=comps.slice(); }
  else{
    const piso=comps[0], techo=comps[comps.length-1];
    const principales=comps.filter(p=>+p.usd_m2>=pivot).slice(0,5);
    const ids=new Set(); compSel=[];
    [piso,...principales,techo].forEach(p=>{ if(p&&!ids.has(p.id)){ ids.add(p.id); compSel.push(p);} });
    compSel.sort((a,b)=>(+a.usd_m2)-(+b.usd_m2));
  }
  const compRol=p=>{ if(comps.length&&p.id===comps[0].id) return 'Piso (mín.)'; if(comps.length&&p.id===comps[comps.length-1].id) return 'Techo (máx.)'; return (+p.usd_m2>=pivot)?'Representativo':'Bajo mediana'; };
  /* -------- motor de oportunidades: jerarquizadas, con inversión y ganancia -------- */
  const INV={reformaUSDm2:350, regulariz:8000};
  /* mediana por tipología dentro de la selección: NO mezclar apto/casa/terreno (USD/m² incomparables) */
  const medByTipo={}; { const g={}; sel.forEach(p=>{ if(+p.usd_m2>0){ (g[p.tipologia]=g[p.tipologia]||[]).push(+p.usd_m2); } }); Object.keys(g).forEach(t=>{ medByTipo[t]=Math.round(median(g[t])); }); }
  const refTipo=p=>medByTipo[p.tipologia]||pivot;
  const oportModelo=p=>{
    const price=+(p.precio_real||p.precio_pub)||0, m2=+p.m2||0, ref=refTipo(p);
    const com=((p.comentarios||'')+' '+(p.estado||'')+' '+(p.tipologia||'')).toLowerCase();
    const esReciclar=/recicl|refacc|reforma/.test(com);
    const esRegular=/regular|sin planos/.test(com);
    const reforma=esReciclar&&m2?Math.round(m2*INV.reformaUSDm2):0;
    const regular=esRegular?INV.regulariz:0;
    const invTotal=price+reforma+regular;
    const valorSalida=(m2&&ref)?Math.round(m2*ref):0;
    const ganancia=(valorSalida&&invTotal)?valorSalida-invTotal:null;
    const roi=(ganancia!=null&&invTotal)?Math.round(ganancia/invTotal*100):null;
    const difMed=(ref&&+p.usd_m2)?Math.round((+p.usd_m2/ref-1)*100):null;
    return {p,price,m2,ref,esReciclar,esRegular,reforma,regular,invTotal,valorSalida,ganancia,roi,difMed};
  };
  /* pool: subvaluadas frente a su propia tipología. Se excluyen outliers de dato dudoso
     (USD/m² < 45% de la mediana de su tipología ⇒ m²/tipología casi siempre mal cargados). */
  const pool=sel.filter(p=>{ const price=+p.precio_real||+p.precio_pub, u=+p.usd_m2, ref=refTipo(p);
    if(!(price>0)||!(u>0)) return false;
    if(ref && u<0.45*ref) return false;
    if(p.gestion==='Tomar acción') return true;
    return ref && u<ref;
  });
  const oport=[...new Map(pool.map(p=>[p.id,p])).values()].map(oportModelo)
     .filter(o=> (o.roi==null || o.roi<=250) && (o.ganancia==null || o.ganancia>0))   // solo ganancia positiva; descarta anomalías de dato
     .sort((a,b)=>{ const ga=a.ganancia==null?-1e12:a.ganancia, gb=b.ganancia==null?-1e12:b.ganancia; return gb-ga; })
     .slice(0,6);
  /* bloque histórico+proyección por zona */
  const bloquesHist=zonasSel.map(zid=>{ const zserie=DB.historico.filter(h=>h.zona===zid).sort((a,b)=>a.anio-b.anio); if(zserie.length<2) return '';
    const cg=cagr(zserie), first=zserie[0], ultimo=zserie[zserie.length-1];
    const accum=Math.round((ultimo.usd_m2/first.usd_m2-1)*100);
    /* variaciones año a año */
    const yoy=[]; for(let i=1;i<zserie.length;i++){ yoy.push({de:zserie[i-1].anio,a:zserie[i].anio,pct:(zserie[i].usd_m2/zserie[i-1].usd_m2-1)*100,punto:zserie[i]}); }
    const maxUp=yoy.reduce((m,x)=>x.pct>m.pct?x:m,yoy[0]);
    const maxDn=yoy.reduce((m,x)=>x.pct<m.pct?x:m,yoy[0]);
    const filas=zserie.map((h,i)=>{ const v=i?(h.usd_m2/zserie[i-1].usd_m2-1)*100:null; const col=v==null?'':(v>=0?'#1F3864':'#b03030'); return `<tr><td>${h.anio}</td><td class="num">${(+h.usd_m2).toLocaleString('es-UY')}</td><td class="num" style="color:${col}">${v==null?'—':(v>=0?'+':'')+v.toFixed(1)+'%'}</td><td class="small">${esc(h.fuente||'s/d')}</td></tr>`; }).join('');
    const driver=HIST_NOTES[zid]||'';
    let narr=`Entre <b>${first.anio}</b> (US$${(+first.usd_m2).toLocaleString('es-UY')}/m²) y <b>${ultimo.anio}</b> (US$${(+ultimo.usd_m2).toLocaleString('es-UY')}/m²) el valor ${accum>=0?'apreció':'se ajustó'} <b>${accum>=0?'+':''}${accum}%</b> acumulado — CAGR <b>${cg===null?'s/d':cg.toFixed(1)+'%'}</b> anual. ${driver?driver.charAt(0).toUpperCase()+driver.slice(1):''}`;
    let saltos='';
    if(maxUp&&maxUp.pct>0.05) saltos+=` El mayor salto interanual fue <b>${maxUp.de}→${maxUp.a}</b> (<b>+${maxUp.pct.toFixed(1)}%</b>${maxUp.punto.fuente?`, según ${esc(maxUp.punto.fuente)}`:''}).`;
    if(maxDn&&maxDn.pct<-0.05) saltos+=` La mayor corrección fue <b>${maxDn.de}→${maxDn.a}</b> (<b>${maxDn.pct.toFixed(1)}%</b>${maxDn.punto.fuente?`, ${esc(maxDn.punto.fuente)}`:''}).`;
    return `<h3>${zoneName(zid)} — evolución ${first.anio}–${ultimo.anio} y proyección a ${ultimo.anio+años}</h3>
      ${lineChartProj(zserie,años)}
      <p class="small">${narr}${saltos}</p>
      <table><thead><tr><th>Año</th><th class="num">USD/m²</th><th class="num">Var. a/a</th><th>Fuente del dato</th></tr></thead><tbody>${filas}</tbody></table>
      <p class="small">Proyección base ${proyCfg.base}% anual (escenarios conservador ${proyCfg.cons}% – optimista ${proyCfg.opt}%):</p>
      ${proyTabla(zserie,años)}`;
  }).filter(Boolean).join('');
  /* factores de valorización por zona */
  const bloquesIV=zonasSel.map(zid=>{ const iv=calcIV(DB.valorizacion[zid]); return `<tr><td><b>${zoneName(zid)}</b></td><td>${(DB.zonas.find(z=>z.id===zid)||{}).departamento||''}</td><td class="num">${(+(DB.zonas.find(z=>z.id===zid)||{}).usd_m2_ref||0).toLocaleString('es-UY')}</td><td class="num"><b style="color:${ivColor(iv)}">${iv} · ${ivLabel(iv)}</b></td><td class="small">${topDrivers(zid)||'s/d'}</td></tr>`; }).join('');
  const chico = s.nv>0 && s.nv<10;
  const css=`
    *{box-sizing:border-box} body{font-family:"Segoe UI",Arial,sans-serif;color:#1a2230;margin:0;font-size:12px;line-height:1.5}
    .wrap{max-width:780px;margin:0 auto;padding:26px}
    h1{color:#1F3864;font-size:22px;margin:0 0 2px} h2{color:#1F3864;font-size:15px;border-bottom:2px solid #D9E1F2;padding-bottom:3px;margin:22px 0 8px}
    h3{color:#2E5496;font-size:13px;margin:14px 0 4px} .sub{color:#5b6472;font-size:12px;margin:0 0 12px}
    table{border-collapse:collapse;width:100%;font-size:11px;margin:4px 0} th,td{border-bottom:1px solid #e8edf6;padding:5px 7px;text-align:left} th{background:#1F3864;color:#fff} td.num,th.num{text-align:right;white-space:nowrap}
    .kpis{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0} .kpi{flex:1 1 120px;border:1px solid #e3e9f4;border-left:4px solid #0F6FC6;border-radius:7px;padding:9px 12px} .kpi .v{font-size:20px;font-weight:800;color:#1F3864} .kpi .l{font-size:10px;color:#5b6472;text-transform:uppercase;letter-spacing:.3px}
    .small{font-size:10.5px;color:#5b6472} .box{background:#eef2f9;border-left:4px solid #1F3864;padding:8px 10px;border-radius:0 6px 6px 0;margin:8px 0}
    .op{border:1px solid #e3e9f4;border-radius:8px;padding:10px 12px;margin:9px 0;break-inside:avoid} .ophd{color:#1F3864;font-size:12.5px} .rank{display:inline-block;background:#1F3864;color:#fff;font-weight:800;border-radius:5px;padding:1px 7px;margin-right:5px;font-size:11px} table.opnum{margin:6px 0 0} table.opnum td{border:0;border-bottom:1px solid #f0f3f9;padding:3px 6px} table.opnum td:first-child{color:#5b6472;width:44%}
    .foot{margin-top:26px;border-top:1px solid #e8edf6;padding-top:8px;color:#7a8494;font-size:10px}
    .no-print{margin:0 0 14px} button{background:#0F6FC6;color:#fff;border:0;padding:9px 16px;border-radius:6px;font-weight:700;cursor:pointer;font-size:13px}
    @media print{ .no-print{display:none} .wrap{max-width:none;padding:0} body{font-size:11px} h2{break-after:avoid} table{break-inside:auto} tr{break-inside:avoid} svg{max-width:100%} @page{margin:14mm} }`;
  const html=`<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Informe ${esc(nomZ)} · ${esc(nomT)}</title><style>${css}</style></head><body><div class="wrap">
    <div class="no-print"><button onclick="window.print()">🖨 Imprimir / Guardar PDF</button></div>

    <p class="sub"><b>${esc(nomT)}</b> · ${sel.length} comparable(s) en base · emitido ${hoy} · Crespo Real State — Estudio del Mercado (metodología ACM)</p>
    ${chico?`<div class="box"><b>⚠ Muestra de ${s.nv} (&lt;10):</b> valores indicativos; la mediana es más robusta que el promedio. Se refuerza al ampliar la base.</div>`:''}
    <h2>Resumen de valores (USD/m²)</h2>
    <div class="kpis">
      <div class="kpi"><div class="v">${s.nv?s.med.toLocaleString('es-UY'):'s/d'}</div><div class="l">Mediana (referencia)</div></div>
      <div class="kpi"><div class="v">${s.nv?s.avg.toLocaleString('es-UY'):'s/d'}</div><div class="l">Promedio</div></div>
      <div class="kpi"><div class="v" style="font-size:15px">${s.nv?s.mn.toLocaleString('es-UY')+' – '+s.mx.toLocaleString('es-UY'):'s/d'}</div><div class="l">Rango mín – máx</div></div>
      <div class="kpi"><div class="v">${sel.length}</div><div class="l">Comparables</div></div>

    <p class="small">La <b>mediana manda</b>: es el valor central de la muestra y no se distorsiona con extremos. El promedio se incluye solo como contraste.</p>

    ${compSel.map(p=>`<tr><td>${esc(p.direccion||'')}</td><td>${esc(zoneName(p.zona))}</td><td>${esc(p.tipologia||'')}</td><td class="num">${p.m2||'s/d'}</td><td class="num">${p.precio_real?money(p.precio_real):money(p.precio_pub)}</td><td class="num"><b>${p.usd_m2||'s/d'}</b></td><td>${p.fecha_aviso||'s/d'}</td><td class="small">${compRol(p)}</td></tr>`).join('')}
    </tbody></table>
    ${bloquesHist?`<h2>Histórico y proyección</h2>${bloquesHist}`:''}

    <h2>Oportunidades <span class="small" style="font-weight:400">— jerarquizadas por ganancia estimada</span></h2>
    ${oport.length?`
    <div class="box small"><b>Supuestos del modelo:</b> valor de salida = m² × <b>mediana de su misma tipología</b> en la selección (no se mezclan apto/casa/terreno); reforma estimada US$ ${INV.reformaUSDm2}/m² en unidades "a reciclar"; regularización US$ ${INV.regulariz.toLocaleString('es-UY')} en unidades sin planos. Se excluyen avisos con USD/m² implausible (dato mal cargado). Cifras indicativas, no constituyen tasación.</div>
    ${oport.map((o,i)=>{ const p=o.p; const razones=[];
      if(o.difMed!=null&&o.difMed<0) razones.push(`entra <b>${Math.abs(o.difMed)}% por debajo de la mediana</b> de su tipología (US$ ${o.ref?o.ref.toLocaleString('es-UY'):'s/d'}/m²) — margen de compra`);
      if(o.esReciclar) razones.push('unidad <b>a reciclar</b>: la reforma la lleva a valor de obra terminada');

      const drv=topDrivers(p.zona); if(drv) razones.push(`drivers de zona: ${drv}`);
      if(!razones.length&&p.gestion==='Tomar acción') razones.push('marcada para tomar acción por el analista');
      if(!razones.length) razones.push('valor por debajo del promedio del segmento');
      const hor=(o.esReciclar||o.esRegular)?'12–18 meses (obra + reventa)':'6–12 meses (reposicionamiento / reventa)';
      const invDetalle=`${money(o.price)}${o.reforma?` + reforma ${money(o.reforma)}`:''}${o.regular?` + regulariz. ${money(o.regular)}`:''}`;
      return `<div class="op"><div class="ophd"><span class="rank">#${i+1}</span> <b>${esc(p.direccion||'s/d')}</b> · ${esc(zoneName(p.zona))} · ${esc(p.tipologia||'')}${p.usd_m2?` · US$ ${p.usd_m2}/m²`:''}</div>

/* -------------------- MAPA -------------------- */
/* color por tipología base (paleta azules del proyecto) */
const TIPO_COLOR={Apartamento:'#0F6FC6',Casa:'#1F3864',Terreno:'#2E5496',Rural:'#8EAADB'};
function tipoColor(t){ return TIPO_COLOR[tipoBase(t)]||'#8892a0'; }
/* desplazamiento determinístico alrededor del centro de zona (~1,5 km) para que no se solapen y sea estable entre renders */
function seedJitter(id){ let h=2166136261; const s=''+id; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); }
  const a=((h>>>0)%1000)/1000, b=(((h>>>10)>>>0)%1000)/1000; const r=0.004+a*0.011, ang=b*2*Math.PI; return [r*Math.cos(ang), r*Math.sin(ang)]; }
function propLatLon(p){ const z=DB.zonas.find(z=>z.id===p.zona);
  if(p.lat&&p.lon&&!isNaN(+p.lat)&&!isNaN(+p.lon)) return {lat:+p.lat,lon:+p.lon,aprox:false};
  if(z&&z.lat&&z.lon){ const [dy,dx]=seedJitter(p.id); return {lat:+z.lat+dy,lon:+z.lon+dx,aprox:true}; }
  return null; }
let mapFilter={zonas:[],tips:[]};
function mapPickZona(v){ mapFilter.zonas=msPick(mapFilter.zonas,v); renderMap(); }
function mapPickTip(v){ mapFilter.tips=msPick(mapFilter.tips,v); renderMap(); }
function renderMap(){
  if(!mapObj){ mapObj=L.map('map').setView([-34.88,-55.4],8); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap · Crespo Real State'}).addTo(mapObj); }
  if(window._mk) window._mk.forEach(m=>mapObj.removeLayer(m)); window._mk=[];
  const tips=[...new Set(DB.propiedades.map(p=>p.tipologia))].filter(Boolean).sort();
  const fz=mapFilter.zonas, ft=mapFilter.tips;
  const sel=DB.propiedades.filter(p=>(!fz.length||fz.includes(p.zona))&&(!ft.length||ft.includes(p.tipologia)));
  const pts=[]; let exactas=0, aprox=0, sinubic=0;
  const money=v=>v?('US$ '+(+v).toLocaleString('es-UY')):'s/d';
  sel.forEach(p=>{ const ll=propLatLon(p); if(!ll){ sinubic++; return; } if(ll.aprox) aprox++; else exactas++;
    const col=tipoColor(p.tipologia);
    const m=L.circleMarker([ll.lat,ll.lon],{radius:7,color:'#fff',weight:2,fillColor:col,fillOpacity:.9})
      .bindPopup(`<b>${esc(p.direccion||'(sin dirección)')}</b><br>${esc(zoneName(p.zona))} · ${esc(p.tipologia||'')}<br>
        ${p.m2?esc(p.m2)+' m² · ':''}USD/m²: <b>${p.usd_m2||'s/d'}</b><br>
        Precio: ${p.precio_real?money(p.precio_real):money(p.precio_pub)}<br>
        ${p.url?`<a href="${p.url}" target="_blank">ver aviso</a> · `:''}<span style="color:${gColor(p.gestion)};font-weight:700">${esc(p.gestion||'')}</span>
        ${ll.aprox?'<br><span style="color:#7a8494">📍 ubicación aproximada (por zona)</span>':'<br><span style="color:#0F6FC6">📍 ubicación geocodificada</span>'}`)
      .addTo(mapObj);
    window._mk.push(m); pts.push([ll.lat,ll.lon]); });
  if(pts.length) mapObj.fitBounds(L.latLngBounds(pts),{padding:[40,40],maxZoom:14});
  setTimeout(()=>mapObj.invalidateSize(),80);
  /* barra de control + leyenda encima del mapa */
  const box=document.getElementById('mapControls');
  if(box) box.innerHTML=`
    <div class="toolbar" style="margin-bottom:8px">
      ${msBox('mz','Todas las zonas',DB.zonas.map(z=>({v:z.id,l:z.nombre})),fz,'mapPickZona','renderMap',200)}
      ${msBox('mt','Todas las tipologías',tips.map(t=>({v:t,l:t})),ft,'mapPickTip','renderMap',195)}
      ${(fz.length||ft.length)?`<button class="act ghost mini" onclick="mapFilter={zonas:[],tips:[]};renderMap()">✕ Limpiar</button>`:''}
      <button class="act ghost mini" onclick="geocodeProps()">📍 Geocodificar direcciones reales</button>
      <span class="small muted">${sel.length} propiedad(es) · <b>${exactas}</b> exacta(s) · <b>${aprox}</b> aproximada(s)${sinubic?` · ${sinubic} sin ubicar (zona sin coordenadas)`:''}</span>
    </div>
    <div class="toolbar" style="margin-bottom:8px;gap:14px">
      ${Object.keys(TIPO_COLOR).map(t=>`<span class="small"><span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${TIPO_COLOR[t]};border:1px solid #fff;box-shadow:0 0 0 1px #ccc;vertical-align:middle;margin-right:4px"></span>${t}</span>`).join('')}
      <span class="small muted">Los puntos <b>aproximados</b> se dispersan alrededor del centro de la zona; no son la parcela exacta. Geocodificá para precisar las que tengan dirección con número.</span>
    </div>`;
}
/* geocodificación on-demand con Nominatim (por número de puerta; intersecciones fallan). 1 req/seg, respeta uso público. */
async function geocodeProps(){
  const cand=DB.propiedades.filter(p=>!(p.lat&&p.lon) && /\d/.test(p.direccion||'') && !/ y | esq/i.test(p.direccion||''));
  if(!cand.length){ alert('No hay direcciones geocodificables (se necesita calle + número; las intersecciones "A y B" no resuelven).'); return; }
  if(!confirm('Voy a intentar geocodificar '+cand.length+' dirección(es) con OpenStreetMap (Nominatim), 1 por segundo. Puede tardar ~'+cand.length+' seg. ¿Seguir?')) return;
  let ok=0,fail=0;
  for(const p of cand){ const z=DB.zonas.find(z=>z.id===p.zona);
    const q=encodeURIComponent((p.direccion||'').replace(/\(.*?\)/g,'').trim()+', '+(z?z.localidad||z.nombre:'')+', '+(z?z.departamento:'')+', Uruguay');
    try{ const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+q,{headers:{'Accept':'application/json'}});
      const d=await r.json(); if(d&&d[0]){ p.lat=+d[0].lat; p.lon=+d[0].lon; ok++; liveUpsert(p); } else fail++;
    }catch(e){ fail++; }
    await new Promise(res=>setTimeout(res,1100));
  }
  if(ok) save();
  alert('Geocodificación terminada:\n• '+ok+' ubicada(s) con precisión\n• '+fail+' no resueltas (quedan aproximadas por zona)');
  renderMap();
}

function dl(name,content,type){ const b=new Blob([content],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name; a.click(); }
function exportJSON(){ dl('crespo-crm-'+new Date().toISOString().slice(0,10)+'.json', JSON.stringify(DB,null,2),'application/json'); }
function exportCSV(){ const h=['id','zona','tipologia','direccion','m2','precio_pub','descuento','precio_real','usd_m2','fecha_aviso','fecha_alta','dias_en_crm','estado','comentarios','gestion','proxima_accion','fecha_seguimiento','responsable','estado_tarea','contacto_nombre','contacto_inmobiliaria','contacto_telefono','contacto_email','acciones','portal','url'];
  const rows=DB.propiedades.map(p=>{ const c=p.contacto||{}; const row=Object.assign({},p,{dias_en_crm:(diasCRM(p)===null?'':diasCRM(p)),contacto_nombre:c.nombre||'',contacto_inmobiliaria:c.inmobiliaria||'',contacto_telefono:c.telefono||'',contacto_email:c.email||'',acciones:(p.acciones||[]).map(a=>a.fecha+': '+a.texto).join(' | ')});
    return h.map(k=>`"${(row[k]!==undefined&&row[k]!==''?row[k]:'').toString().replace(/"/g,'""')}"`).join(','); });
  dl('crespo-propiedades.csv',[h.join(','),...rows].join('\n'),'text/csv'); }
function importJSON(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.zonas||!d.propiedades) throw new Error('formato'); DB=d; save(); alert('Base importada.'); show('dashboard'); }catch(err){ alert('Archivo inválido: '+err.message); } }; r.readAsText(f); }

/* -------------------- NUBE (Supabase) -------------------- */
let sb=null;
function sbCfg(){ return {url:localStorage.getItem('sb_url')||'', key:localStorage.getItem('sb_key')||''}; }
/* silencioso: devuelve el cliente o null, sin alertar */
function sbClient(){ const c=sbCfg(); if(!c.url||!c.key||!window.supabase) return null; if(!sb) sb=window.supabase.createClient(c.url,c.key); return sb; }
function ensureSb(){ if(!sbClient()){ alert('Primero conectá: pegá Project URL + publishable key y tocá "Conectar".'); return false; } return true; }
/* restaura la sesión guardada al cargar y escucha cambios de login/logout */
async function sbInit(){ const c=sbClient(); if(!c){ renderWhoami(); return; } try{ const r=await c.auth.getSession(); sbUser=r.data.session? r.data.session.user : null;
    c.auth.onAuthStateChange(function(_e,session){ sbUser=session? session.user : null; renderWhoami(); }); }catch(e){} renderWhoami(); }
function sbConnect(){ const url=(val('sb_url_in')||'').trim(), key=(val('sb_key_in')||'').trim(); if(!url||!key){ alert('Completá URL y publishable key.'); return; } localStorage.setItem('sb_url',url); localStorage.setItem('sb_key',key); sb=null; sbUser=null; if(sbClient()){ sbInit(); alert('Conexión guardada. Ahora tocá "Ingresar" (arriba a la derecha) con tu usuario de analista.'); renderBase(); } }
function numN(v){ return (v===''||v===undefined||v===null||isNaN(+v))?null:+v; }
function dtN(v){ return v?v:null; }
function toRow(p){ return {id:p.id,zona:p.zona,tipologia:p.tipologia,direccion:p.direccion,m2:numN(p.m2),precio_pub:numN(p.precio_pub),descuento:numN(p.descuento),precio_real:numN(p.precio_real),usd_m2:numN(p.usd_m2),fecha_aviso:dtN(p.fecha_aviso),fecha_alta:dtN(p.fecha_alta),lat:numN(p.lat),lon:numN(p.lon),estado:p.estado||'',comentarios:p.comentarios||'',gestion:p.gestion||'Sin clasificar',proxima_accion:p.proxima_accion||'',fecha_seguimiento:dtN(p.fecha_seguimiento),responsable:p.responsable||'',estado_tarea:p.estado_tarea||'',contacto:p.contacto||{},acciones:p.acciones||[],portal:p.portal||'',url:p.url||''}; }
/* alta en CRM: si la tabla no tiene fecha_alta, se usa created_at (fecha real de inserción en Supabase) */
function fromRow(r){ return {id:r.id,zona:r.zona,tipologia:r.tipologia,direccion:r.direccion,m2:r.m2==null?'':r.m2,precio_pub:r.precio_pub==null?'':r.precio_pub,descuento:r.descuento==null?'':r.descuento,precio_real:r.precio_real==null?'':r.precio_real,usd_m2:r.usd_m2==null?'':r.usd_m2,fecha_aviso:r.fecha_aviso||'',fecha_alta:r.fecha_alta||(r.created_at?(''+r.created_at).slice(0,10):''),lat:r.lat==null?'':r.lat,lon:r.lon==null?'':r.lon,estado:r.estado||'',comentarios:r.comentarios||'',gestion:r.gestion||'Sin clasificar',proxima_accion:r.proxima_accion||'',fecha_seguimiento:r.fecha_seguimiento||'',responsable:r.responsable||'',estado_tarea:r.estado_tarea||'',contacto:r.contacto||{nombre:'',telefono:'',email:'',inmobiliaria:''},acciones:r.acciones||[],portal:r.portal||'',url:r.url||''}; }
async function sbPush(){ if(!ensureSb()) return; if(!sbUser){ alert('Ingresá primero (botón "Ingresar" arriba a la derecha). Las tablas requieren sesión.'); return; } try{
    const zonas=DB.zonas.map(z=>Object.assign({},z,{valorizacion:DB.valorizacion[z.id]||{}}));
    let r=await sb.from('zonas').upsert(zonas,{onConflict:'id'}); if(r.error) throw r.error;
    const rows=DB.propiedades.map(toRow);
    r=await sb.from('propiedades').upsert(rows,{onConflict:'id'});
    /* si la tabla aún no tiene alguna columna nueva (fecha_alta, lat, lon), se reintenta sin ella hasta 3 veces */
    let intentos=0, faltantes=[];
    while(r.error && intentos<3){ const col=(r.error.message||'').match(/'([a-z_]+)' column|column "?([a-z_]+)"?/i); const c=col&&(col[1]||col[2]);
      if(!c || !['fecha_alta','lat','lon','responsable','estado_tarea'].includes(c)) break;
      faltantes.push(c); r=await sb.from('propiedades').upsert(rows.map(x=>{ const o=Object.assign({},x); faltantes.forEach(f=>delete o[f]); return o; }),{onConflict:'id'}); intentos++; }
    if(r.error) throw r.error;
    if(faltantes.length) setTimeout(()=>alert('⚠ Se subió, pero tu tabla no tiene la(s) columna(s): '+faltantes.join(', ')+'.\nPara guardar esos datos, corré una vez en el SQL editor de Supabase:\nalter table propiedades add column if not exists lat numeric, add column if not exists lon numeric, add column if not exists fecha_alta date, add column if not exists responsable text, add column if not exists estado_tarea text;'),100);
    await sb.from('historico').delete().gte('id',0);
    if(DB.historico.length){ r=await sb.from('historico').insert(DB.historico.map(h=>({zona:h.zona,tipologia:h.tipologia,anio:h.anio,usd_m2:h.usd_m2,fuente:h.fuente}))); if(r.error) throw r.error; }
    alert('Base subida a Supabase:\n• '+DB.zonas.length+' zonas\n• '+DB.propiedades.length+' propiedades\n• '+DB.historico.length+' puntos históricos');
  }catch(e){ alert('Error al subir: '+(e.message||e)+'\n(copiame este mensaje y lo ajustamos)'); } }
/* completa fecha_alta (antigüedad EN EL CRM) de las propiedades en s/d con el created_at real de Supabase */
async function sbFillAltas(){ if(!ensureSb()) return; if(!sbUser){ alert('Ingresá primero (botón "Ingresar" arriba a la derecha).'); return; } try{
    const r=await sb.from('propiedades').select('id,url,fecha_alta,created_at'); if(r.error) throw r.error;
    const byId={}, byUrl={};
    (r.data||[]).forEach(x=>{ const f=x.fecha_alta||(x.created_at?(''+x.created_at).slice(0,10):''); if(!f) return; byId[x.id]=f; if(x.url) byUrl[x.url]=f; });
    let n=0, faltan=0;
    DB.propiedades.forEach(p=>{ if(p.fecha_alta) return; const f=byId[p.id]||(p.url?byUrl[p.url]:''); if(f){ p.fecha_alta=f; n++; } else faltan++; });
    if(n) save();
    alert('Fechas de alta completadas: '+n+' propiedad(es).'+(faltan?'\n'+faltan+' siguen en s/d (no están en Supabase): cargalas a mano en la ficha o subí la base primero.':''));
    renderProps();
  }catch(e){ alert('Error al traer fechas de alta: '+(e.message||e)); } }
async function sbPull(){ if(!ensureSb()) return; if(!sbUser){ alert('Ingresá primero (botón "Ingresar" arriba a la derecha). Las tablas requieren sesión.'); return; } if(!confirm('Traer la base de Supabase reemplaza la base local. ¿Continuar?')) return; try{
    const z=await sb.from('zonas').select('*'); if(z.error) throw z.error;
    const p=await sb.from('propiedades').select('*'); if(p.error) throw p.error;
    const h=await sb.from('historico').select('*'); if(h.error) throw h.error;
    DB.zonas=(z.data||[]).map(function(zz){ var o=Object.assign({},zz); delete o.valorizacion; delete o.created_at; return o; });
    DB.valorizacion={}; (z.data||[]).forEach(function(zz){ DB.valorizacion[zz.id]=zz.valorizacion||{}; });
    DB.propiedades=(p.data||[]).map(fromRow);
    DB.historico=(h.data||[]).map(function(x){ return {zona:x.zona,tipologia:x.tipologia,anio:x.anio,usd_m2:x.usd_m2,fuente:x.fuente}; });
    save(); alert('Base traída de Supabase: '+DB.zonas.length+' zonas, '+DB.propiedades.length+' propiedades.'); show('dashboard');
  }catch(e){ alert('Error al traer: '+(e.message||e)+'\n(copiame este mensaje y lo ajustamos)'); } }
function q(v){ return (v===null||v===undefined)?'null':"'"+(''+v).replace(/'/g,"''")+"'"; }
function nz(v){ return (v===''||v===null||v===undefined||isNaN(+v))?'null':(+v); }
function qd(v){ return v?("'"+v+"'"):'null'; }
function genSQL(){
  let s='-- Datos Crespo Real State para Supabase (correr después de supabase-schema.sql)\nbegin;\n';
  DB.zonas.forEach(function(z){ s+='insert into zonas(id,nombre,departamento,localidad,tipologia,usd_m2_ref,lat,lon,perfil,notas,valorizacion) values ('+q(z.id)+','+q(z.nombre)+','+q(z.departamento)+','+q(z.localidad)+','+q(z.tipologia)+','+nz(z.usd_m2_ref)+','+nz(z.lat)+','+nz(z.lon)+','+q(z.perfil)+','+q(z.notas)+','+q(JSON.stringify(DB.valorizacion[z.id]||{}))+'::jsonb) on conflict (id) do update set valorizacion=excluded.valorizacion, usd_m2_ref=excluded.usd_m2_ref;\n'; });
  DB.propiedades.forEach(function(p){ var r=toRow(p); s+='insert into propiedades(id,zona,tipologia,direccion,m2,precio_pub,descuento,precio_real,usd_m2,fecha_aviso,estado,comentarios,gestion,proxima_accion,fecha_seguimiento,responsable,estado_tarea,contacto,acciones,portal,url) values ('+q(r.id)+','+q(r.zona)+','+q(r.tipologia)+','+q(r.direccion)+','+nz(r.m2)+','+nz(r.precio_pub)+','+nz(r.descuento)+','+nz(r.precio_real)+','+nz(r.usd_m2)+','+qd(r.fecha_aviso)+','+q(r.estado)+','+q(r.comentarios)+','+q(r.gestion)+','+q(r.proxima_accion)+','+qd(r.fecha_seguimiento)+','+q(r.responsable)+','+q(r.estado_tarea)+','+q(JSON.stringify(r.contacto))+'::jsonb,'+q(JSON.stringify(r.acciones))+'::jsonb,'+q(r.portal)+','+q(r.url)+') on conflict (url) do nothing;\n'; });
  DB.historico.forEach(function(h){ s+='insert into historico(zona,tipologia,anio,usd_m2,fuente) values ('+q(h.zona)+','+q(h.tipologia)+','+(h.anio||'null')+','+nz(h.usd_m2)+','+q(h.fuente)+');\n'; });
  s+='commit;\n';
  dl('crespo-datos-supabase.sql',s,'text/sql');
}
